<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Highway Stats Section</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #111;
  font-family: 'Montserrat', sans-serif;
  min-height: 300vh;
}

.demo-spacer {
  height: 40vh;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.15); font-size: 14px; letter-spacing: 2px;
}

/* ═══ MAIN SECTION ═══ */
.highway-section {
  position: relative;
  width: 100%;
  overflow: hidden;
  background-image: url('https://saddlebrown-meerkat-952255.hostingersite.com/wp-content/uploads/2026/06/bodybg.jpg');
  background-size: cover;
  background-position: center;
  padding: 0;
  /* TOLL PLAZA WHITE BORDER */
  border: 3px solid #ffffff;
  outline: 6px solid rgba(255,255,255,0.15);
  outline-offset: -3px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.highway-section.in-view { opacity: 1; transform: translateY(0); }

/* Corner toll booth markers */
.highway-section::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.52);
  z-index: 0;
  pointer-events: none;
}

/* ── TOLL BOOTH CORNER PILLARS ── */
.toll-corner {
  position: absolute;
  width: 18px;
  height: 18px;
  z-index: 10;
  pointer-events: none;
}
.toll-corner::before, .toll-corner::after {
  content: '';
  position: absolute;
  background: #fff;
}
.toll-corner.tl { top: -3px; left: -3px; }
.toll-corner.tl::before { width: 40px; height: 4px; top: 0; left: 0; }
.toll-corner.tl::after  { width: 4px; height: 40px; top: 0; left: 0; }

.toll-corner.tr { top: -3px; right: -3px; }
.toll-corner.tr::before { width: 40px; height: 4px; top: 0; right: 0; }
.toll-corner.tr::after  { width: 4px; height: 40px; top: 0; right: 0; }

.toll-corner.bl { bottom: -3px; left: -3px; }
.toll-corner.bl::before { width: 40px; height: 4px; bottom: 0; left: 0; }
.toll-corner.bl::after  { width: 4px; height: 40px; bottom: 0; left: 0; }

.toll-corner.br { bottom: -3px; right: -3px; }
.toll-corner.br::before { width: 40px; height: 4px; bottom: 0; right: 0; }
.toll-corner.br::after  { width: 4px; height: 40px; bottom: 0; right: 0; }

/* ── TOLL PLAZA TOP ARCH BAR ── */
.toll-arch {
  position: relative;
  z-index: 5;
  background: linear-gradient(to bottom, #1a1a1a, #111);
  border-bottom: 3px solid #fff;
  display: flex;
  align-items: stretch;
  height: 38px;
}
.toll-arch-seg {
  flex: 1;
  border-right: 2px solid rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
}
.toll-arch-seg:last-child { border-right: none; }
.toll-arch-seg span {
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.35);
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  text-transform: uppercase;
}

/* ── TOLL PLAZA BOTTOM BAR ── */
.toll-base {
  position: relative;
  z-index: 5;
  background: linear-gradient(to top, #1a1a1a, #111);
  border-top: 3px solid #fff;
  display: flex;
  align-items: stretch;
  height: 38px;
}
.toll-base-seg {
  flex: 1;
  border-right: 2px solid rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
}
.toll-base-seg:last-child { border-right: none; }

/* ═══ STREETLIGHT POSTS ═══ */
.streetlight-row {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 4;
}

/* Individual light post */
.light-post {
  position: absolute;
  bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Vertical pole */
.pole {
  width: 3px;
  background: linear-gradient(to top, #666, #aaa, #ddd);
  border-radius: 2px;
  flex-shrink: 0;
}

/* Horizontal arm */
.arm {
  position: absolute;
  top: 0;
  height: 3px;
  background: linear-gradient(to right, #bbb, #ddd);
  border-radius: 2px;
  transform-origin: left center;
}

/* Lamp head */
.lamp-head {
  position: absolute;
  top: 0;
  width: 22px;
  height: 10px;
  background: linear-gradient(to bottom, #ddd, #aaa);
  border-radius: 3px 3px 5px 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: visible;
}

/* Light cone SVG beam */
.light-beam {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  pointer-events: none;
}

/* Glow dot on lamp */
.lamp-glow {
  width: 8px;
  height: 4px;
  background: #fffde7;
  border-radius: 50%;
  box-shadow: 0 0 6px 3px rgba(255,253,200,0.9), 0 0 16px 6px rgba(255,240,100,0.5);
  animation: lampFlicker 4s ease-in-out infinite;
}

@keyframes lampFlicker {
  0%,100% { opacity: 1; box-shadow: 0 0 6px 3px rgba(255,253,200,0.9), 0 0 16px 6px rgba(255,240,100,0.5); }
  50%      { opacity: 0.88; box-shadow: 0 0 8px 4px rgba(255,253,200,1),   0 0 22px 8px rgba(255,240,100,0.6); }
  75%      { opacity: 0.95; }
}

/* ═══ ROAD LANE (top) ═══ */
.road-lane {
  position: relative;
  width: 100%;
  height: 140px;
  background: #0a0a0a;
  border-top: 2px solid rgba(255,255,255,0.12);
  border-bottom: 2px solid rgba(255,255,255,0.12);
  overflow: hidden;
  z-index: 2;
  display: flex;
  align-items: center;
}

/* Zebra crossing left */
.zebra {
  width: 60px;
  height: 100%;
  flex-shrink: 0;
}
.zebra-stripe {
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    #fff 0px, #fff 16px,
    transparent 16px, transparent 28px
  );
  opacity: 0.8;
}

/* Dashed center line */
.road-lane::after {
  content: '';
  position: absolute;
  left: 60px; right: 0; top: 50%;
  height: 3px;
  background: repeating-linear-gradient(to right,
    rgba(255,255,255,0.2) 0, rgba(255,255,255,0.2) 40px,
    transparent 40px, transparent 70px);
  transform: translateY(-50%);
}

.car-track {
  flex: 1;
  height: 100%;
  position: relative;
  overflow: hidden;
}

.car-img {
  position: absolute;
  top: 50%;
  height: 105px;
  width: auto;
  will-change: transform;
  filter: drop-shadow(0 0 14px rgba(245,166,35,0.3));
}

/* ═══ STATS ROW ═══ */
.stats-row {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 48px 40px;
  /* Subtle inner white lines like toll lanes */
  background: transparent;
}

/* Vertical lane dividers — white like toll booths */
.stat-divider {
  width: 2px;
  height: 90px;
  background: linear-gradient(to bottom,
    transparent 0%,
    rgba(255,255,255,0.35) 20%,
    rgba(255,255,255,0.5) 50%,
    rgba(255,255,255,0.35) 80%,
    transparent 100%);
  flex-shrink: 0;
  position: relative;
}
/* Small bolt/rivet on divider */
.stat-divider::before, .stat-divider::after {
  content: '';
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 6px; height: 6px;
  background: #fff;
  border-radius: 50%;
}
.stat-divider::before { top: 0; }
.stat-divider::after  { bottom: 0; }

.stat-item {
  flex: 1;
  text-align: center;
  padding: 0 28px;
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.stat-item.visible { opacity: 1; transform: translateY(0); }

/* Highlighted center stat */
.stat-item.highlight {
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(180,100,220,0.55);
  border-radius: 4px;
  padding: 18px 28px;
  margin: -18px 0;
}

.stat-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(50px, 6vw, 80px);
  color: #f5a623;
  line-height: 1;
  letter-spacing: 2px;
  display: block;
}

.stat-label {
  font-size: clamp(10px, 1.1vw, 13px);
  color: rgba(255,255,255,0.72);
  font-weight: 600;
  letter-spacing: 1.5px;
  margin-top: 8px;
  text-transform: uppercase;
}

/* ═══ BOTTOM ROAD LANE ═══ */
.bottom-road-lane {
  position: relative;
  width: 100%;
  height: 140px;
  background: #0a0a0a;
  border-top: 2px solid rgba(255,255,255,0.12);
  border-bottom: 2px solid rgba(255,255,255,0.12);
  overflow: hidden;
  z-index: 2;
  display: flex;
  align-items: center;
}

/* Glow line top/bottom */
.glow-line {
  height: 2px;
  background: linear-gradient(to right, transparent, #f5a623 30%, #f5a623 70%, transparent);
  opacity: 0.45;
  position: relative;
  z-index: 3;
}

/* Light cone canvas */
#lightCanvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 3;
}
</style>
</head>
<body>

<div class="demo-spacer">↓ Scroll down to see the Toll Plaza section</div>

<!-- ══════════════════════════════════════════════ -->
<!--         HIGHWAY STATS — TOLL PLAZA STYLE       -->
<!-- ══════════════════════════════════════════════ -->
<section class="highway-section" id="highwaySection">

  <!-- Toll booth corner brackets -->
  <div class="toll-corner tl"></div>
  <div class="toll-corner tr"></div>
  <div class="toll-corner bl"></div>
  <div class="toll-corner br"></div>

  <!-- Light cone canvas (drawn by JS) -->
  <canvas id="lightCanvas"></canvas>

  <!-- Streetlight posts (injected by JS) -->
  <div class="streetlight-row" id="streetlightRow"></div>

  <!-- TOP ARCH BAR -->
  <div class="toll-arch">
    <div class="toll-arch-seg"><span>LANE 1</span></div>
    <div class="toll-arch-seg"><span>LANE 2</span></div>
    <div class="toll-arch-seg"><span>LANE 3</span></div>
    <div class="toll-arch-seg"><span>LANE 4</span></div>
  </div>

  <div class="glow-line"></div>

  <!-- TOP ROAD — car LEFT → RIGHT -->
  <div class="road-lane" id="topRoad">
    <div class="zebra"><div class="zebra-stripe"></div></div>
    <div class="car-track">
      <img class="car-img" id="topCar"
        src="https://saddlebrown-meerkat-952255.hostingersite.com/wp-content/uploads/2026/06/left-taxi.png"
        alt="Taxi" draggable="false" style="transform:translate(-200px,-50%)"/>
    </div>
  </div>

  <!-- STATS ROW -->
  <div class="stats-row">
    <div class="stat-item" data-delay="0">
      <span class="stat-number" data-target="50" data-suffix="+">0+</span>
      <span class="stat-label">Highway Projects</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item highlight" data-delay="150">
      <span class="stat-number" data-target="120" data-suffix="+">0+</span>
      <span class="stat-label">Completed Works</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item" data-delay="300">
      <span class="stat-number" data-target="98" data-suffix="%">0%</span>
      <span class="stat-label">Client Satisfaction</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item" data-delay="450">
      <span class="stat-number" data-target="12" data-suffix="">0</span>
      <span class="stat-label">Patented Technologies</span>
    </div>
  </div>

  <!-- BOTTOM ROAD — cars RIGHT → LEFT -->
  <div class="bottom-road-lane" id="bottomRoad">
    <div class="zebra"><div class="zebra-stripe"></div></div>
    <div class="car-track">
      <img class="car-img" id="bottomCar1"
        src="https://saddlebrown-meerkat-952255.hostingersite.com/wp-content/uploads/2026/06/right-taxi.png"
        alt="Taxi" draggable="false" style="transform:translate(9999px,-50%)"/>
      <img class="car-img" id="bottomCar2"
        src="https://saddlebrown-meerkat-952255.hostingersite.com/wp-content/uploads/2026/06/right-taxi.png"
        alt="Taxi" draggable="false" style="height:88px;top:55%;transform:translate(9999px,-50%)"/>
    </div>
  </div>

  <div class="glow-line"></div>

  <!-- BOTTOM BASE BAR -->
  <div class="toll-base">
    <div class="toll-base-seg"></div>
    <div class="toll-base-seg"></div>
    <div class="toll-base-seg"></div>
    <div class="toll-base-seg"></div>
  </div>

</section>

<div class="demo-spacer">↑ Scroll back up</div>

<script>
/* ══════════════════════════════════════
   STREETLIGHT BUILDER
══════════════════════════════════════ */
function buildStreetlights() {
  const section = document.getElementById('highwaySection');
  const row = document.getElementById('streetlightRow');
  const W = section.offsetWidth;
  const H = section.offsetHeight;

  // Place lights at quarter positions along the section
  const positions = [0.15, 0.38, 0.62, 0.85];
  const topRoad = document.getElementById('topRoad');
  const archH = document.querySelector('.toll-arch').offsetHeight;
  const glowH = 2;
  const roadH = topRoad.offsetHeight;

  // Top lights hang DOWN from top into top road
  // Bottom lights stand UP from bottom into bottom road
  positions.forEach((p, i) => {
    const xPos = Math.round(p * W);

    // ── TOP LIGHT (hangs down from toll arch, shines into top road) ──
    const topPost = document.createElement('div');
    topPost.className = 'light-post top-light-post';
    const poleH = 38; // how far pole goes down into road
    const armLen = 28;
    topPost.style.cssText = `
      position:absolute;
      left:${xPos}px;
      top:${archH + glowH}px;
      width:3px;
      height:${poleH}px;
      background:linear-gradient(to bottom,#aaa,#666);
      border-radius:2px;
    `;

    // Arm extending left or right alternately
    const armDir = i % 2 === 0 ? -1 : 1;
    const arm = document.createElement('div');
    arm.style.cssText = `
      position:absolute;
      bottom:-3px;
      ${armDir === -1 ? 'right' : 'left'}:0;
      width:${armLen}px;
      height:3px;
      background:linear-gradient(to ${armDir===-1?'left':'right'},#aaa,#ddd);
      border-radius:2px;
    `;

    // Lamp at end of arm
    const lamp = document.createElement('div');
    lamp.style.cssText = `
      position:absolute;
      bottom:-4px;
      ${armDir===-1?'right':' left'}:${armLen-1}px;
      width:20px; height:9px;
      background:linear-gradient(to bottom,#ccc,#999);
      border-radius:3px 3px 6px 6px;
      display:flex; align-items:center; justify-content:center;
    `;
    const glow = document.createElement('div');
    glow.className = 'lamp-glow';
    lamp.appendChild(glow);
    arm.appendChild(lamp);
    topPost.appendChild(arm);
    row.appendChild(topPost);

    // ── BOTTOM LIGHT (stands up from bottom road floor) ──
    const bottomY = H - document.querySelector('.toll-base').offsetHeight - glowH - roadH;
    const botPost = document.createElement('div');
    botPost.style.cssText = `
      position:absolute;
      left:${xPos}px;
      bottom:${document.querySelector('.toll-base').offsetHeight + glowH}px;
      width:3px;
      height:${poleH}px;
      background:linear-gradient(to top,#888,#bbb);
      border-radius:2px;
    `;

    const armBot = document.createElement('div');
    const armDirB = armDir * -1;
    armBot.style.cssText = `
      position:absolute;
      top:-3px;
      ${armDirB===-1?'right':'left'}:0;
      width:${armLen}px;
      height:3px;
      background:linear-gradient(to ${armDirB===-1?'left':'right'},#aaa,#ddd);
      border-radius:2px;
    `;
    const lampBot = document.createElement('div');
    lampBot.style.cssText = `
      position:absolute;
      top:-4px;
      ${armDirB===-1?'right':'left'}:${armLen-1}px;
      width:20px; height:9px;
      background:linear-gradient(to bottom,#ccc,#999);
      border-radius:3px 3px 6px 6px;
      display:flex; align-items:center; justify-content:center;
    `;
    const glowBot = document.createElement('div');
    glowBot.className = 'lamp-glow';
    glowBot.style.animationDelay = (i * 0.7) + 's';
    lampBot.appendChild(glowBot);
    armBot.appendChild(lampBot);
    botPost.appendChild(armBot);
    row.appendChild(botPost);
  });
}

/* ══════════════════════════════════════
   LIGHT CONE CANVAS PAINTER
══════════════════════════════════════ */
function paintLightCones() {
  const canvas = document.getElementById('lightCanvas');
  const section = document.getElementById('highwaySection');
  const W = section.offsetWidth;
  const H = section.offsetHeight;
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const archH = document.querySelector('.toll-arch').offsetHeight + 2;
  const baseH = document.querySelector('.toll-base').offsetHeight + 2;
  const roadH = 140;
  const statsH = H - archH - baseH - roadH * 2 - 4;

  const positions = [0.15, 0.38, 0.62, 0.85];
  const armLen = 28;

  positions.forEach((p, i) => {
    const x = Math.round(p * W);
    const armDir = i % 2 === 0 ? -1 : 1;
    const lampX = x + armDir * armLen;

    // ── Top cone (shining down into top road) ──
    const topLampY = archH + 35; // bottom of arm
    const coneBottom = archH + roadH - 5;
    const coneW = 55;
    const grad1 = ctx.createLinearGradient(lampX, topLampY, lampX, coneBottom);
    grad1.addColorStop(0, 'rgba(255,248,180,0.28)');
    grad1.addColorStop(1, 'rgba(255,248,120,0.0)');
    ctx.beginPath();
    ctx.moveTo(lampX, topLampY);
    ctx.lineTo(lampX - coneW, coneBottom);
    ctx.lineTo(lampX + coneW, coneBottom);
    ctx.closePath();
    ctx.fillStyle = grad1;
    ctx.fill();

    // ── Bottom cone (shining up into bottom road) ──
    const botRoadTop = H - baseH - roadH;
    const botLampY = H - baseH - 35;
    const armDirB = armDir * -1;
    const lampXB = x + armDirB * armLen;
    const grad2 = ctx.createLinearGradient(lampXB, botLampY, lampXB, botRoadTop);
    grad2.addColorStop(0, 'rgba(255,248,180,0.28)');
    grad2.addColorStop(1, 'rgba(255,248,120,0.0)');
    ctx.beginPath();
    ctx.moveTo(lampXB, botLampY);
    ctx.lineTo(lampXB - coneW, botRoadTop);
    ctx.lineTo(lampXB + coneW, botRoadTop);
    ctx.closePath();
    ctx.fillStyle = grad2;
    ctx.fill();
  });
}

/* ══════════════════════════════════════
   SCROLL ANIMATION
══════════════════════════════════════ */
const section   = document.getElementById('highwaySection');
const topCar    = document.getElementById('topCar');
const bottomCar1 = document.getElementById('bottomCar1');
const bottomCar2 = document.getElementById('bottomCar2');
const statItems  = document.querySelectorAll('.stat-item');

let countersStarted = false;
let sectionVisible  = false;

function onScroll() {
  const winH      = window.innerHeight;
  const rect      = section.getBoundingClientRect();
  const sectionTop = rect.top;
  const sectionH   = rect.height;

  if (sectionTop < winH * 0.92 && !sectionVisible) {
    section.classList.add('in-view');
    sectionVisible = true;
  }

  const rawProgress = (winH - sectionTop) / (winH + sectionH);
  const progress    = Math.max(0, Math.min(1, rawProgress));

  const trackW = section.offsetWidth - 60;

  // Top car: left → right
  const topX = -160 + progress * (trackW + 320);
  topCar.style.transform = `translateY(-50%) translateX(${topX}px)`;

  // Bottom car 1: right → left
  const bot1X = trackW + 160 - progress * (trackW + 320);
  bottomCar1.style.transform = `translateY(-50%) translateX(${bot1X}px)`;

  // Bottom car 2: trailing
  const prog2 = Math.max(0, Math.min(1, rawProgress - 0.13));
  const bot2X = trackW + 160 - prog2 * (trackW + 320);
  bottomCar2.style.transform = `translateY(-50%) translateX(${bot2X}px)`;

  // Stat fade-ins
  statItems.forEach((item, i) => {
    if (progress > 0.15 + i * 0.05) {
      setTimeout(() => item.classList.add('visible'), parseInt(item.dataset.delay) || 0);
    }
  });

  if (progress > 0.2 && !countersStarted) {
    countersStarted = true;
    startCounters();
  }
}

function startCounters() {
  document.querySelectorAll('.stat-number').forEach(el => {
    const target   = parseInt(el.dataset.target);
    const suffix   = el.dataset.suffix || '';
    const duration = 1800;
    const start    = performance.now();
    function update(now) {
      const t      = Math.min((now - start) / duration, 1);
      const eased  = 1 - Math.pow(1 - t, 3);
      el.textContent = Math.round(eased * target) + suffix;
      if (t < 1) requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  });
}

window.addEventListener('scroll', onScroll, { passive: true });

window.addEventListener('load', () => {
  buildStreetlights();
  paintLightCones();
  onScroll();
});

window.addEventListener('resize', () => {
  document.getElementById('streetlightRow').innerHTML = '';
  buildStreetlights();
  paintLightCones();
});
</script>
</body>
</html>
