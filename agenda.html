<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GDCC Expo Canada 2026 — Conference Programme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Abel&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
    }

    .hdr {
      background: #fff;
      border-bottom: 2px solid #eee;
      box-shadow: 0 2px 18px rgba(0,0,0,0.07);
      padding: 18px 32px 0;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .hdr-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .event-brand p {
      font-size: 10px;
      font-weight: 700;
      color: #c0182e;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 3px;
      font-family: 'Inter', sans-serif;
    }

    .event-brand h2 {
      font-size: clamp(15px, 1.9vw, 21px);
      font-weight: 400;
      color: #1a1a2e;
      letter-spacing: 0.3px;
      font-family: 'Abel', sans-serif;
    }

    .date-tabs {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .dtab {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 24px;
      border-radius: 10px;
      cursor: pointer;
      border: 1.5px solid #e0e0e0;
      background: #f9f9f9;
      transition: all 0.25s;
      min-width: 96px;
      position: relative;
    }

    .dtab:hover { border-color: #c0182e; background: #fff5f5; }

    .dtab.active {
      background: linear-gradient(135deg, #c0182e, #8a0018);
      border-color: #c0182e;
      box-shadow: 0 4px 18px rgba(192,24,46,0.28);
    }

    .dtab-day {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #aaa;
      font-family: 'Inter', sans-serif;
    }

    .dtab.active .dtab-day { color: rgba(255,255,255,0.78); }

    .dtab-date {
      font-size: 18px;
      font-weight: 400;
      color: #1a1a2e;
      line-height: 1.15;
      margin-top: 2px;
      font-family: 'Abel', sans-serif;
    }

    .dtab.active .dtab-date { color: #fff; }

    .dtab-arrow {
      font-size: 11px;
      margin-top: 4px;
      color: #aaa;
      transition: color 0.25s, transform 0.3s;
      display: block;
      line-height: 1;
    }

    .dtab.active .dtab-arrow {
      color: rgba(255,255,255,0.8);
      transform: rotate(180deg);
    }

    .dtab:hover .dtab-arrow { color: #c0182e; }

    .cat-tabs {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      padding-bottom: 14px;
      scrollbar-width: none;
    }

    .cat-tabs::-webkit-scrollbar { display: none; }

    .cattab {
      padding: 7px 16px;
      border-radius: 7px;
      cursor: pointer;
      white-space: nowrap;
      border: 1.5px solid #e0e0e0;
      background: #fff;
      color: red;
      font-size: 12px;
      font-family: 'Abel', sans-serif;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .cattab:hover { border-color: #c0182e; color: #c0182e; background: #fff5f5; }

    .cattab.active {
      background: #c0182e;
      border-color: #c0182e;
      color: #fff;
      font-weight: 600;
    }

    .body {
      padding: 28px 32px 0;
      position: relative;
      z-index: 1;
    }

    .day-panel { display: none; animation: fadeIn 0.35s ease; }
    .day-panel.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .day-title {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 26px;
      flex-wrap: wrap;
    }

    .day-title h3 {
      font-size: clamp(15px, 2.2vw, 22px);
      font-weight: 400;
      color: #1a1a2e;
      font-family: 'Abel', sans-serif;
      letter-spacing: 0.3px;
    }

    .day-title-line {
      flex: 1;
      height: 1.5px;
      background: linear-gradient(90deg, #c0182e, transparent);
      min-width: 30px;
    }

    .day-title-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c0182e;
      padding: 4px 14px;
      border: 1.5px solid rgba(192,24,46,0.25);
      border-radius: 20px;
      background: rgba(192,24,46,0.06);
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }

    .timeline { position: relative; max-width: 1100px; }

    .timeline::before {
      content: '';
      position: absolute;
      left: 136px;
      top: 0;
      bottom: 0;
      width: 1.5px;
      background: linear-gradient(to bottom, transparent, #ddd 5%, #ddd 95%, transparent);
    }

    .trow {
      display: flex;
      align-items: flex-start;
      margin-bottom: 10px;
      position: relative;
    }

    .trow.hidden { display: none !important; }

    .tlabel {
      width: 136px;
      flex-shrink: 0;
      padding: 22px 20px 0 0;
      text-align: right;
      position: relative;
    }

    .tlabel-time {
      font-size: 20px;
      font-weight: 400;
      color: #1a1a2e;
      display: block;
      line-height: 1;
      font-family: 'Abel', sans-serif;
    }

    .tlabel-sub {
      font-size: 12px;
      color: #c0182e;
      display: block;
      margin-top: 3px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
    }

    .tdot {
      position: absolute;
      right: -6px;
      top: 27px;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #c0182e;
      box-shadow: 0 0 0 3px #f0f2f5, 0 0 0 4.5px rgba(192,24,46,0.22);
      transition: all 0.3s;
    }

    .scard {
      flex: 1;
      margin-left: 28px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.28s cubic-bezier(0.25,0.8,0.25,1);
      position: relative;
      background: #ffffff;
      border: 1px solid red;
      box-shadow: 0 2px 12px rgba(192,24,46,0.06), inset 0 1px 0 rgba(255,255,255,1);
    }

    .scard::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3.5px;
      background: linear-gradient(to bottom, #c0182e, #ff5a6a);
      border-radius: 12px 0 0 12px;
    }

    .scard:hover {
      background: #fff;
      border-color: rgba(192,24,46,0.35);
      transform: translateX(5px) translateY(-1px);
      box-shadow: 0 8px 28px rgba(192,24,46,0.13);
    }

    .card-inner {
      display: flex;
      align-items: flex-start;
      padding: 18px 22px 18px 26px;
    }

    .card-logo {
      width: 76px;
      height: 76px;
      border-radius: 9px;
      flex-shrink: 0;
      margin-right: 18px;
      background: rgba(192,24,46,0.06);
      border: 1px solid rgba(192,24,46,0.16);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .card-logo-text {
      font-size: 9px;
      font-weight: 700;
      color: rgba(192,24,46,0.55);
      text-align: center;
      line-height: 1.45;
      padding: 8px;
      letter-spacing: 0.6px;
      font-family: 'Inter', sans-serif;
      white-space: pre-line;
    }

    .scard:hover .card-logo {
      border-color: rgba(192,24,46,0.38);
      background: rgba(192,24,46,0.1);
    }

    .card-content { flex: 1; min-width: 0; }

    .ctype {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 5px;
      transition: color 0.25s;
      font-family: 'Inter', sans-serif;
    }

    .scard:hover .ctype { color: #c0182e; }

    .ctitle {
      font-size: 18px;
      font-weight: 400;
      color: #1a1a2e;
      margin-bottom: 5px;
      line-height: 1.3;
      font-family: 'Abel', sans-serif;
    }

    .ctloc {
      font-size: 13px;
      color: #999;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
      font-family: 'Inter', sans-serif;
    }

    .ctloc .dot { color: #c0182e; }

    .cbrief {
      font-size: 13px;
      color: #666;
      line-height: 1.65;
      margin-bottom: 10px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.35s;
      opacity: 0;
      font-family: 'Inter', sans-serif;
    }

    .scard:hover .cbrief { max-height: 150px; opacity: 1; }

    .cspeakers {
      font-size: 12px;
      color: #aaa;
      font-style: italic;
      margin-bottom: 10px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.35s;
      opacity: 0;
      font-family: 'Inter', sans-serif;
    }

    .scard:hover .cspeakers { max-height: 60px; opacity: 1; }

    .ctags { display: flex; flex-wrap: wrap; gap: 5px; }

    .ctag {
      padding: 3px 11px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
    }

    .ctag.red    { background: rgba(192,24,46,0.08);  border: 1px solid rgba(192,24,46,0.28);  color: #c0182e; }
    .ctag.purple { background: rgba(110,45,195,0.07); border: 1px solid rgba(110,45,195,0.24); color: #6e2dc3; }
    .ctag.teal   { background: rgba(14,148,134,0.07); border: 1px solid rgba(14,148,134,0.24); color: #0e9486; }
    .ctag.amber  { background: rgba(195,125,0,0.07);  border: 1px solid rgba(195,125,0,0.24);  color: #c37d00; }
    .ctag.blue   { background: rgba(28,96,210,0.07);  border: 1px solid rgba(28,96,210,0.24);  color: #1c60d2; }
    .ctag.green  { background: rgba(25,148,55,0.07);  border: 1px solid rgba(25,148,55,0.24);  color: #199437; }
    .ctag.navy   { background: rgba(26,26,46,0.07);   border: 1px solid rgba(26,26,46,0.24);   color: #1a1a2e; }

    .break-row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      position: relative;
    }

    .break-dot {
      position: absolute;
      left: 131px;
      top: 50%;
      transform: translateY(-50%);
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ddd;
      border: 1.5px solid #ccc;
    }

    .break-inner {
      flex: 1;
      margin-left: 168px;
      padding: 10px 18px;
      background: #fff;
      border: 1.5px dashed #e5e5e5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .break-icon { font-size: 15px; opacity: .45; }

    .break-text {
      font-size: 12px;
      color: #bbb;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: 'Abel', sans-serif;
    }

    .break-time {
      font-size: 11px;
      color: #ccc;
      margin-left: auto;
      font-family: 'Inter', sans-serif;
    }

    .sdiv {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 16px;
    }

    .sdiv-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #ddd, transparent);
    }

    .sdiv-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #c0182e;
      padding: 4px 14px;
      border: 1px solid rgba(192,24,46,0.2);
      border-radius: 20px;
      background: rgba(192,24,46,0.05);
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: #ccc;
      font-size: 16px;
      display: none;
      font-family: 'Abel', sans-serif;
    }

    .no-results.show { display: block; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 32px 52px;
      gap: 12px;
    }

    .bnav-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 26px;
      border-radius: 12px;
      border: 1.5px solid rgba(192,24,46,0.25);
      background: #fff;
      cursor: pointer;
      transition: all 0.28s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 2px 10px rgba(192,24,46,0.07);
      user-select: none;
    }

    .bnav-btn:hover {
      background: #c0182e;
      border-color: #c0182e;
      transform: translateY(-3px);
      box-shadow: 0 10px 26px rgba(192,24,46,0.25);
    }

    .bnav-btn:hover .bnav-label,
    .bnav-btn:hover .bnav-sub,
    .bnav-btn:hover .bnav-arrow { color: #fff; }

    .bnav-arrow {
      font-size: 22px;
      color: #c0182e;
      transition: color 0.25s;
      line-height: 1;
      font-weight: 300;
    }

    .bnav-text { display: flex; flex-direction: column; }
    .bnav-text.right { text-align: right; }

    .bnav-sub {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #bbb;
      font-family: 'Inter', sans-serif;
      transition: color 0.25s;
    }

    .bnav-label {
      font-size: 15px;
      font-weight: 400;
      color: #1a1a2e;
      font-family: 'Abel', sans-serif;
      letter-spacing: 0.3px;
      transition: color 0.25s;
    }

    .bnav-spacer { flex: 1; }

    /* ── RESPONSIVE ── */
    @media(max-width:900px) {
      .hdr { padding: 14px 20px 0; }
      .hdr-top { flex-direction: column; gap: 12px; }
      .body { padding: 20px 20px 0; }
      .timeline::before { left: 116px; }
      .tlabel { width: 116px; padding: 18px 14px 0 0; }
      .tlabel-time { font-size: 18px; }
      .tdot { right: -6px; top: 22px; }
      .scard { margin-left: 22px; }
      .card-inner { padding: 14px 16px 14px 20px; }
      .card-logo { width: 66px; height: 66px; margin-right: 14px; }
      .ctitle { font-size: 16px; }
      .break-dot { left: 111px; }
      .break-inner { margin-left: 142px; }
      .bottom-nav { padding: 22px 20px 40px; }
    }

    @media(max-width:600px) {
      .hdr { padding: 12px 14px 0; }
      .body { padding: 14px 14px 0; }
      .day-title { gap: 8px; margin-bottom: 18px; }
      .timeline::before { display: none; }
      .trow { flex-direction: column; margin-bottom: 12px; }
      .tlabel {
        width: 100%;
        text-align: left;
        padding: 0 0 0 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-left: 3px solid #c0182e;
        margin-bottom: 8px;
      }
      .tlabel-time { font-size: 19px; }
      .tlabel-sub { font-size: 11px; margin-top: 0; display: inline; }
      .tdot { display: none; }
      .scard { margin-left: 0; width: 100%; }
      .scard:hover { transform: translateY(-2px); }
      .card-inner { padding: 12px 14px 12px 18px; }
      .card-logo { width: 58px; height: 58px; margin-right: 12px; }
      .ctitle { font-size: 15px; }
      .break-row { flex-direction: column; align-items: flex-start; }
      .break-dot { display: none; }
      .break-inner { margin-left: 0; width: 100%; }
      .bottom-nav { padding: 18px 14px 36px; }
      .bnav-btn { padding: 11px 16px; gap: 8px; }
      .bnav-label { font-size: 13px; }
    }

    @media(max-width:380px) {
      .date-tabs { width: 100%; }
      .dtab { flex: 1; }
      .card-logo { display: none; }
      .cat-tabs { gap: 4px; }
      .cattab { padding: 6px 11px; font-size: 11px; }
    }
  </style>
</head>

<body>

  <div id="app"></div>

  <script>
    const CATS = [
      { id: 'all',      label: 'All Sessions' },
      { id: 'keynote',  label: 'Keynotes' },
      { id: 'panel',    label: 'Panels' },
      { id: 'tech',     label: 'Tech Sessions' },
      { id: 'cloud',    label: 'Cloud' },
      { id: 'ai',       label: 'AI & Compute' },
      { id: 'industry', label: 'Industry Cases' },
      { id: 'security', label: 'Security' },
      { id: 'energy',   label: 'Energy & Power' },
    ];

    let currentDay = 0;
    let currentCat = 'all';

    function buildApp() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="hdr">
          <div class="hdr-top">
            <div class="event-brand">
              <p>${DATA.event.name}</p>
              <h2>${DATA.event.subtitle}</h2>
            </div>
            <div class="date-tabs" id="dateTabs">
              ${DATA.days.map((d, i) => `
                <div class="dtab${i === 0 ? ' active' : ''}" onclick="switchDay(${i}, this)">
                  <span class="dtab-day">${d.day}</span>
                  <span class="dtab-date">${d.date}</span>
                  <span class="dtab-arrow">▼</span>
                </div>`).join('')}
            </div>
          </div>
          ${/*
      <div class="cat-tabs">
        ${CATS.map(c => `<div class="cattab${c.id === 'all' ? ' active' : ''}" onclick="filterCat('${c.id}',this)">${c.label}</div>`).join('')}
      </div>
      */''}
        </div>
        <div class="body" id="body">
          ${DATA.days.map((day, di) => `
            <div class="day-panel${di === 0 ? ' active' : ''}" id="day${di}">
              <div class="day-title">
                <div class="day-title-badge">${day.label} · ${day.date} 2026</div>
                <div class="day-title-line"></div>
                <h3>${day.theme}</h3>
              </div>
              <div class="timeline">
                ${renderSections(day.sections)}
              </div>
              <div class="no-results" id="no${di}">No sessions match your filter.</div>
            </div>`).join('')}
        </div>
        <div class="bottom-nav" id="bottomNav"></div>`;
    }

    function renderSections(sections) {
      return sections.map(sec => {
        if (sec.break) return `
          <div class="break-row">
            <div class="break-dot"></div>
            <div class="break-inner">
              <span class="break-icon">${sec.label === 'Lunch' ? '🍽️' : '☕'}</span>
              <span class="break-text">${sec.label}</span>
              <span class="break-time">${sec.time}</span>
            </div>
          </div>`;
        return `
          ${sec.label ? `<div class="sdiv"><div class="sdiv-line"></div><div class="sdiv-label">${sec.label}</div><div class="sdiv-line"></div></div>` : ''}
          ${sec.sessions.map(s => renderSession(s)).join('')}`;
      }).join('');
    }

    function renderSession(s) {
      const catsStr = s.cats.join(' ');
      const tags = s.tags.map(t => `<span class="ctag ${t.color}">${t.label}</span>`).join('');
      const speakerHtml = s.speakers ? `<div class="cspeakers">Speakers: ${s.speakers}</div>` : '';
      return `
        <div class="trow" data-cats="${catsStr}">
          <div class="tlabel">
            <div class="tdot"></div>
            <span class="tlabel-time">${s.time}</span>
            <span class="tlabel-sub">– ${s.timeTo}</span>
          </div>
          <div class="scard">
            <div class="card-inner">
              <div class="card-logo"><div class="card-logo-text">${s.logo}</div></div>
              <div class="card-content">
                <div class="ctype">${s.type}</div>
                <div class="ctitle">${s.title}</div>
                <div class="ctloc">${s.time} – ${s.timeTo} <span class="dot">•</span> ${s.stage}</div>
                <div class="cbrief">${s.brief}</div>
                ${speakerHtml}
                <div class="ctags">${tags}</div>
              </div>
            </div>
          </div>
        </div>`;
    }

    function renderBottomNav() {
      const nav = document.getElementById('bottomNav');
      if (!nav) return;
      const days = DATA.days;
      let html = '';

      if (currentDay > 0) {
        const prev = days[currentDay - 1];
        html += `
          <div class="bnav-btn" onclick="switchDay(${currentDay - 1}, document.querySelectorAll('.dtab')[${currentDay - 1}])">
            <span class="bnav-arrow">←</span>
            <div class="bnav-text">
              <span class="bnav-sub">Previous</span>
              <span class="bnav-label">${prev.label} · ${prev.date}</span>
            </div>
          </div>`;
      } else {
        html += `<div class="bnav-spacer"></div>`;
      }

      if (currentDay < days.length - 1) {
        const next = days[currentDay + 1];
        html += `
          <div class="bnav-btn" onclick="switchDay(${currentDay + 1}, document.querySelectorAll('.dtab')[${currentDay + 1}])">
            <div class="bnav-text right">
              <span class="bnav-sub">Next</span>
              <span class="bnav-label">${next.label} · ${next.date}</span>
            </div>
            <span class="bnav-arrow">→</span>
          </div>`;
      } else {
        html += `<div class="bnav-spacer"></div>`;
      }

      nav.innerHTML = html;
    }

    function switchDay(d, el) {
      currentDay = d;
      document.querySelectorAll('.dtab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('day' + d).classList.add('active');
      applyFilters();
      renderBottomNav();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function filterCat(cat, el) {
      currentCat = cat;
      document.querySelectorAll('.cattab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      applyFilters();
    }

    function applyFilters() {
      const panel = document.getElementById('day' + currentDay);
      const rows = panel.querySelectorAll('.trow');
      let vis = 0;
      rows.forEach(row => {
        const cats = (row.dataset.cats || '').split(' ');
        const ok = currentCat === 'all' || cats.includes(currentCat);
        row.classList.toggle('hidden', !ok);
        if (ok) vis++;
      });
      document.getElementById('no' + currentDay).classList.toggle('show', vis === 0);
    }

    buildApp();
    renderBottomNav();
  </script>
